<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>무선운용일지 뷰</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="view.css" />
</head>
<body>
  <main class="page view-page">
    <header class="report-header view-header" aria-label="뷰 메타 정보">
      <div class="title-block">
        <h1>무선운용일지 뷰</h1>
        <p class="doc-note">입력 화면에서 저장된 데이터를 읽기 전용으로 표시합니다.</p>
      </div>
      <div class="view-meta" aria-label="기준 정보">
        <p class="view-meta-line"><span>기준일</span><strong id="view-date-value">-</strong></p>
        <p class="view-meta-line"><span>작성자 오전</span><strong id="view-author-am">-</strong></p>
        <p class="view-meta-line"><span>작성자 오후</span><strong id="view-author-pm">-</strong></p>
      </div>
    </header>

    <section class="print-signature" aria-label="인쇄 서명란">
      <p class="print-signature-line">
        <span class="print-signature-role">무선반장</span>
        <span class="print-signature-mark">서명</span>
        <span class="print-signature-blank"></span>
      </p>
    </section>

    <section id="view-empty" class="view-empty" hidden>
      <h2>저장된 일지 데이터가 없습니다.</h2>
      <p id="view-empty-detail" class="view-empty-detail"></p>
    </section>

    <section id="view-journal-blocks" class="blocks" aria-label="무선 일지 조회 블록" hidden>
      <h1 class="matrix-major">외부망</h1>
      <h2 class="network-major">사단망</h2>
      <div class="division-grid">
        <div class="table-shell">
          <table class="matrix-table division-table" aria-label="사단망 조회표">
            <thead>
              <tr>
                <th>시간 \ 망</th>
                <th class="guide-col-head">구분</th>
                <th>작전망</th>
                <th>행정군수망</th>
              </tr>
            </thead>
            <tbody id="view-division-body"></tbody>
          </table>
        </div>
        <div class="table-shell">
          <table class="matrix-table division-pre-table" aria-label="사단망 PRE 조회표">
            <thead>
              <tr>
                <th>시간 \ PRE</th>
                <th class="guide-col-head">구분</th>
                <th>PRE(행정군수망)</th>
              </tr>
            </thead>
            <tbody id="view-division-pre-body"></tbody>
          </table>
        </div>
      </div>

      <h1 class="matrix-major">내부망</h1>
      <h2 class="network-major">여단망</h2>
      <h3 class="matrix-minor">CF</h3>
      <div class="table-shell">
        <table class="matrix-table brigade-table" aria-label="여단망 CF 조회표">
          <thead>
            <tr>
              <th>시간 \ 대대</th>
              <th class="guide-col-head">구분</th>
              <th>0FA</th>
              <th>1FA</th>
              <th>2FA</th>
              <th>3FA</th>
              <th>4FA</th>
            </tr>
          </thead>
          <tbody id="view-brigade-cf-body"></tbody>
        </table>
      </div>

      <h3 class="matrix-minor">F</h3>
      <div class="table-shell">
        <table class="matrix-table brigade-table" aria-label="여단망 F 조회표">
          <thead>
            <tr>
              <th>시간 \ 대대</th>
              <th class="guide-col-head">구분</th>
              <th>0FA</th>
              <th>1FA</th>
              <th>2FA</th>
              <th>3FA</th>
              <th>4FA</th>
            </tr>
          </thead>
          <tbody id="view-brigade-f-body"></tbody>
        </table>
      </div>

      <h3 class="matrix-minor">PRE(위치취합보고)</h3>
      <div class="table-shell">
        <table class="matrix-table brigade-table" aria-label="여단망 PRE 조회표">
          <thead>
            <tr>
              <th>시간 \ 대대</th>
              <th class="guide-col-head">구분</th>
              <th>0FA</th>
              <th>1FA</th>
              <th>2FA</th>
              <th>3FA</th>
              <th>4FA</th>
            </tr>
          </thead>
          <tbody id="view-brigade-pre-body"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
  <script src="view.js"></script>
</body>
</html>
