<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>무선 일지 관리</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="report-header">
      <div class="title-block">
        <p class="doc-label">보고서 양식</p>
        <h1>무선 일지 관리</h1>
        <p class="doc-note">부대: 1DIV / 0FA / 1FA / 2FA / 3FA / 4FA</p>
      </div>
      <div class="control-block">
        <label class="field">
          <span>기준일</span>
          <input id="date-input" type="date" />
        </label>
        <div class="actions">
          <button id="today-btn" type="button">오늘</button>
          <button id="reset-btn" type="button">해당일 양식 재생성</button>
        </div>
      </div>
    </header>

    <section class="author-record" aria-label="작성자 기록">
      <h2>작성자 기록</h2>
      <div class="author-fields">
        <label class="author-field">
          <span>오전</span>
          <input id="author-am" type="text" />
        </label>
        <label class="author-field">
          <span>오후</span>
          <input id="author-pm" type="text" />
        </label>
      </div>
    </section>

    <section id="journal-blocks" class="blocks" aria-label="무선 일지 입력 블록">
      <h1 class="matrix-major">사단망</h1>
      <div class="table-shell">
        <table class="matrix-table division-table" aria-label="사단망 입력표">
          <thead>
            <tr>
              <th>망 \ 시간</th>
              <th>오전</th>
              <th>오후</th>
            </tr>
          </thead>
          <tbody id="division-body"></tbody>
        </table>
      </div>

      <h1 class="matrix-major">여단망</h1>
      <h2 class="matrix-minor">CF</h2>
      <div class="table-shell">
        <table class="matrix-table brigade-table" aria-label="여단망 CF 입력표">
          <thead>
            <tr>
              <th>시간 \ 대대</th>
              <th>0FA</th>
              <th>1FA</th>
              <th>2FA</th>
              <th>3FA</th>
              <th>4FA</th>
            </tr>
          </thead>
          <tbody id="brigade-cf-body"></tbody>
        </table>
      </div>

      <h2 class="matrix-minor">F</h2>
      <div class="table-shell">
        <table class="matrix-table brigade-table" aria-label="여단망 F 입력표">
          <thead>
            <tr>
              <th>시간 \ 대대</th>
              <th>0FA</th>
              <th>1FA</th>
              <th>2FA</th>
              <th>3FA</th>
              <th>4FA</th>
            </tr>
          </thead>
          <tbody id="brigade-f-body"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
