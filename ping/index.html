<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ping Heatmap</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="p">
    <section class="card">
      <header class="hd">
        <div>
          <h1>Ping Heatmap</h1>
          <p class="sub">Each host is one cell (5 columns)</p>
        </div>
        <div class="meta">
          <div class="m"><span>Endpoint</span><code id="ep"></code></div>
          <div class="m"><span>Last fetch</span><span id="lf">—</span></div>
          <div class="m"><span>Status</span><span id="fs">—</span></div>
        </div>
      </header>

      <div class="ctl">
        <button id="rf" class="btn" type="button">Refresh now</button>
        <label class="tog">
          <input id="ar" type="checkbox" checked />
          <span class="ui" aria-hidden="true"></span>
          <span>Auto refresh</span>
        </label>
      </div>

      <section class="heatmap" aria-label="Ping host heatmap">
        <div id="hm-body" class="hm-body"></div>
      </section>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
