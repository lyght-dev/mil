<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>이더넷 모니터</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="p">
    <section class="card">
      <header class="hd">
        <div>
          <h1>이더넷 모니터</h1>
          <p class="sub"><span id="ri">1</span>분마다 자동 갱신됩니다.</p>
        </div>
        <div class="meta">
          <div class="m"><span>요청 경로</span><code id="ep"></code></div>
          <div class="m"><span>마지막 갱신</span><span id="lf">—</span></div>
          <div class="m"><span>조회 상태</span><span id="fs">—</span></div>
        </div>
      </header>

      <div class="ctl">
        <button id="rf" class="btn" type="button">새로고침</button>
        <label class="tog">
          <input id="ar" type="checkbox" checked />
          <span class="ui" aria-hidden="true"></span>
          <span>자동 새로고침</span>
        </label>
      </div>

      <section class="heatmap" aria-label="호스트 핑 상태">
        <div id="hm-body" class="hm-body"></div>
      </section>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
