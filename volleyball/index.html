<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Volleyball MVP</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <main class="app">
        <header class="hud">
            <h1>Volleyball MVP</h1>
            <p id="connection" class="status">Connecting...</p>
            <p id="role" class="status">Role: -</p>
            <p id="message" class="status">Waiting for server</p>
        </header>

        <canvas id="game" width="960" height="540" aria-label="Volleyball game area"></canvas>

        <section class="help">
            <p>Controls: Left / Right / Up Arrow</p>
        </section>
    </main>

    <script src="/script.js"></script>
</body>
</html>
