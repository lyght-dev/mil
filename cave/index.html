<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cave Omok</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<main class="wrap">
    <h1>Cave Omok</h1>

    <section class="panel">
        <p id="connection">Disconnected</p>
        <p id="role">Role: -</p>
        <p id="phase">Waiting for server</p>
        <p id="readyState">Ready - Black: X | White: X</p>
        <button id="readyBtn" type="button">Ready</button>
    </section>

    <canvas id="board"></canvas>

    <section class="panel">
        <h2>Log</h2>
        <div id="log" class="log"></div>
    </section>
</main>

<script src="/script.js"></script>
</body>
</html>
