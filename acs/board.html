<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>7136부대 위치 정보 관리 시스템 조회</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="board-page">
  <main class="page board-shell">
    <header class="topbar">
      <div>
        <h1>7136부대 위치 정보 관리 시스템</h1>
      </div>
      <div class="actions">
        <a class="btn-link" href="/index.html">스캐너로 이동</a>
        <a class="btn-link" href="/setting.html">설정</a>
        <button id="bd-refresh" class="btn-link" type="button">새로고침</button>
      </div>
    </header>

    <section class="bd-meta">
      <div>상태: <span id="bd-stat">정상</span></div>
      <div>마지막 갱신: <span id="bd-upd">-</span></div>
    </section>

    <section class="panel log-ctrl">
      <label id="log-day-fld" class="field log-fld">
        <span>날짜</span>
        <input id="log-day" type="date">
      </label>

      <label class="field log-fld">
        <span>현재 상태</span>
        <select id="log-current">
          <option value="all">전체</option>
          <option value="current-entry">현재 입영자</option>
          <option value="current-exit">현재 퇴영자</option>
        </select>
      </label>

      <label class="field log-fld">
        <span>검색</span>
        <input id="log-q" type="text" autocomplete="off" placeholder="군번, 이름 또는 위치">
      </label>

      <label class="field log-fld">
        <span>정렬</span>
        <select id="log-sort">
          <option value="desc">최신순</option>
          <option value="asc">오래된순</option>
        </select>
      </label>
    </section>

    <section class="log-box" aria-live="polite">
      <div class="tbl-wrap">
        <table class="tbl-log">
          <thead>
            <tr>
              <th id="log-col-1" scope="col">시간</th>
              <th id="log-col-2" scope="col">구분</th>
              <th id="log-col-3" scope="col">위치</th>
              <th id="log-col-4" scope="col">군번</th>
              <th id="log-col-5" scope="col">이름</th>
            </tr>
          </thead>
          <tbody id="log-body">
            <tr>
              <td colspan="5" class="empty-cell">로그가 없습니다.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="/script.js"></script>
</body>
</html>
