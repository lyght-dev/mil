<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>7136부대 위치 정보 관리 시스템 설정</title>
  <link rel="stylesheet" href="/public/style.css">
  <link rel="stylesheet" href="/public/setting.css">
</head>
<body class="setting-page">
  <main class="page setting-shell">
    <header class="topbar">
      <div>
        <h1>사용자 설정</h1>
      </div>
      <div class="actions">
        <a class="btn-link" href="/public/board.html">현황판으로 이동</a>
        <a class="btn-link" href="/public/index.html">스캐너로 이동</a>
      </div>
    </header>

    <section class="stg-grid">
      <section class="panel stg-card">
        <h2 id="stg-panel-title">사용자 정보</h2>

        <form id="stg-form" class="stg-form" novalidate>
          <div class="stg-serial-line">
            <div class="stg-serial-meta">
              <span class="stg-serial-meta-label">마지막 재발급 시각</span>
              <strong id="stg-serial-reissued-at">-</strong>
            </div>
            <button id="stg-reissue-btn" class="btn-link stg-reissue-btn" type="button">serial 재발급</button>
          </div>
          <label class="field" for="stg-id">
            <span>군번</span>
            <input id="stg-id" name="id" type="text" autocomplete="off" placeholder="a25-76000001" required>
          </label>
          <label class="field" for="stg-name">
            <span>이름</span>
            <input id="stg-name" name="name" type="text" autocomplete="off" placeholder="홍길동" required>
          </label>
          <label class="field" for="stg-unit">
            <span>소속</span>
            <input id="stg-unit" name="unit" type="text" autocomplete="off" placeholder="통신중대" required>
          </label>
          <div class="stg-form-actions">
            <button id="stg-edit-btn" class="btn-pri" type="button">수정</button>
            <button id="stg-delete-btn" class="btn-link stg-danger" type="button">삭제</button>
            <button id="stg-save-btn" class="btn-pri" type="submit" hidden>저장</button>
            <button id="stg-cancel-btn" class="btn-link stg-reset" type="button" hidden>취소</button>
          </div>
        </form>
      </section>

      <section class="panel stg-card">
        <h2>사용자 목록</h2>
        <div class="stg-toolbar">
          <input id="stg-search" class="stg-search" type="text" autocomplete="off" placeholder="군번, 이름, 소속 검색">
          <button id="stg-reload" class="btn-link stg-reload" type="button">목록 재조회</button>
          <button id="stg-add" class="btn-pri stg-add" type="button">사용자 추가</button>
        </div>
        <div class="stg-table-wrap">
          <table class="stg-table">
            <thead>
              <tr>
                <th scope="col">군번</th>
                <th scope="col">이름</th>
                <th scope="col">소속</th>
              </tr>
            </thead>
            <tbody id="stg-body">
              <tr>
                <td colspan="3" class="empty-cell">명단을 불러오는 중입니다.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>
  <script src="/public/setting.js"></script>
</body>
</html>
