<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>7136부대 위치 정보 관리 시스템</title>
  <link rel="stylesheet" href="/public/style.css">
</head>
<body class="scanner-page">
  <main class="page scanner-shell">
    <header class="topbar">
      <div>
        <h1>7136부대 위치 정보 관리 시스템</h1>
      </div>
      <a class="btn-link" href="/public/board.html">현황판 보기</a>
    </header>

    <section class="panel">
      <section id="loc-pnl" class="loc-pnl">
        <p>스캐너에 들어가기 전에 위치를 선택해 주세요.</p>
        <button id="loc-btn" class="btn-pri" type="button">위치 선택</button>
      </section>

      <dialog id="loc-dlg" class="loc-dlg">
        <form id="loc-form" class="loc-form" method="dialog">
          <h2>스캐너 위치 선택</h2>
          <label class="field" for="loc-select">
            <span>위치</span>
            <select id="loc-select">
              <option value="">위치를 선택해 주세요</option>
            </select>
          </label>
          <div class="loc-act">
            <button id="loc-cancel" class="btn-link" type="button">취소</button>
            <button id="loc-ok" class="btn-pri" type="submit">선택 완료</button>
          </div>
        </form>
      </dialog>

      <section id="scan-pnl" hidden>
        <div class="sel-loc">
          <span class="sel-loc-label">선택 위치</span>
          <strong id="sel-loc-txt">-</strong>
        </div>

        <form id="scan-form" class="scan-form">
          <label class="field">
            <span>바코드</span>
            <input id="barcode" type="text" autocomplete="off" placeholder="EN123456">
          </label>
        </form>
      </section>

      <section class="msg-pnl" aria-live="polite">
        <div class="msg-label">처리 결과</div>
        <div id="msg-txt" class="msg-txt">위치를 선택해 주세요.</div>
      </section>
    </section>
  </main>
  <script src="/public/script.js"></script>
</body>
</html>
